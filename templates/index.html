<!DOCTYPE html>

<html>

<head>

```
<title>Medical Chatbot</title>

<style>

    body{
        font-family: Arial;
        margin:40px;
        background:#f5f5f5;
    }

    .container{
        background:white;
        padding:30px;
        border-radius:10px;
        max-width:1000px;
        margin:auto;
    }

    textarea{
        width:100%;
        height:100px;
        font-size:16px;
    }

    button{
        margin-top:10px;
        padding:10px 20px;
        font-size:16px;
    }

    .answer{
        margin-top:30px;
        padding:20px;
        background:#eef7ff;
        border-radius:10px;
    }

    .sources{
        margin-top:20px;
        padding:20px;
        background:#f3fff1;
        border-radius:10px;
    }

</style>
```

</head>

<body>

<div class="container">

```
<h1>Medical Chatbot</h1>

<form action="/ask" method="post">

    <textarea
        name="question"
        placeholder="Ask a medical question..."
        required></textarea>

    <br>

    <button type="submit">
        Ask
    </button>

</form>

{% if question %}

    <div class="answer">

        <h3>Question</h3>

        <p>{{ question }}</p>

        <h3>Answer</h3>

        <p>{{ answer }}</p>

    </div>

{% endif %}


{% if sources %}

    <div class="sources">

        <h3>Sources</h3>

        <ul>

            {% for source in sources %}

                <li>{{ source }}</li>

            {% endfor %}

        </ul>

    </div>

{% endif %}
```

</div>

</body>
</html>
